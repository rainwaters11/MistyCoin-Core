[profile.default]
src             = "contracts"
out             = "out"
libs            = ["lib"]
solc_version    = "0.8.26"
via_ir          = true
optimizer       = true
optimizer_runs  = 200

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]

# Skip OZ internal test harnesses so `forge build` stays clean.
skip = [
    "lib/openzeppelin-contracts/fv/**",
    "lib/openzeppelin-contracts/test/**",
    "lib/openzeppelin-contracts/scripts/**",
    "lib/openzeppelin-contracts/lib/**",
    "lib/openzeppelin-contracts/contracts/mocks/**",
    "lib/openzeppelin-contracts/contracts/crosschain/**",
]
