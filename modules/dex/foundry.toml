[profile.default]
src             = "."
out             = "out"
libs            = ["lib"]
remappings      = ["@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/"]
solc_version    = "0.8.26"
via_ir          = true
optimizer       = true
optimizer_runs  = 200

# Exclude OZ internal test/formal-verification harnesses and bleeding-edge
# contracts that require solc ^0.8.27, which is not yet available locally.
# Only the contracts/ folder files we actually import are compiled.
skip = [
    "lib/openzeppelin-contracts/fv/**",
    "lib/openzeppelin-contracts/test/**",
    "lib/openzeppelin-contracts/scripts/**",
    "lib/openzeppelin-contracts/lib/**",
    "lib/openzeppelin-contracts/contracts/mocks/**",
    "lib/openzeppelin-contracts/contracts/crosschain/**",
]
